name: SSH Manual Build

on:
  workflow_dispatch:

jobs:
  ssh-build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup tmate with China mirror
      uses: mxschmitt/action-tmate@v3
      with:
        limit-access-to-actor: true
        tmate-server-host: "tmate.sh"
        tmate-server-port: 22
